[project]
name = "loop0"
version = "0.1.0"
description = "Minimal agent runtime SDK"
readme = "README.md"
requires-python = ">=3.13"
dependencies = [
    "jinja2>=3.1",
]

[project.scripts]
loop0-demo = "examples.start_agent:main"

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["loop0*", "examples*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
]
