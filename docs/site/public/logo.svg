<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loops mark">
  <title>Loops</title>
  <defs>
    <linearGradient id="lp-ring" x1="16" y1="16" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="52" height="52" rx="14" fill="#101014"/>

  <!-- HLP loop: full ring with a checkpoint gap at the top -->
  <path d="M37.5 17 A16 16 0 1 1 26.5 17" stroke="url(#lp-ring)" stroke-width="5" stroke-linecap="round"/>

  <!-- Cyan diamond = checkpoint / boundary contract (◆ defined by HLP) -->
  <rect x="28.8" y="9.8" width="6.4" height="6.4" rx="1.2" transform="rotate(45 32 13)" fill="#22D3EE"/>

  <!-- Work node the loop runs around -->
  <circle cx="32" cy="32" r="3.4" fill="#F97316"/>
</svg>
