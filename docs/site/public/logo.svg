<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loops mark">
  <title>Loops</title>
  <defs>
    <linearGradient id="lp-ring" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="13" fill="#101014"/>

  <!-- HLP loop: full ring with a checkpoint gap at the top -->
  <path d="M37.5 17 A16 16 0 1 1 26.5 17" stroke="url(#lp-ring)" stroke-width="7" stroke-linecap="round"/>

  <!-- Cyan diamond = checkpoint / boundary contract (◆ defined by HLP) -->
  <rect x="27.4" y="8.4" width="9.2" height="9.2" rx="1.4" transform="rotate(45 32 13)" fill="#22D3EE"/>

  <!-- Work node the loop runs around -->
  <circle cx="32" cy="32" r="4" fill="#F97316"/>
</svg>
