<svg width="32" height="32" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Loops favicon">
  <title>Loops</title>
  <defs>
    <linearGradient id="fv-ring" x1="14" y1="14" x2="50" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#A78BFA"/>
      <stop offset="0.55" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#22D3EE"/>
    </linearGradient>
  </defs>

  <rect x="4" y="4" width="56" height="56" rx="13" fill="#101014"/>

  <!-- Chunkier ring so it holds up at 16px -->
