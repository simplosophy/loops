  <!-- Larger checkpoint diamond straddling the gap -->
  <rect x="27.4" y="8.4" width="9.2" height="9.2" rx="1.4" transform="rotate(45 32 13)" fill="#22D3EE"/>

  <circle cx="32" cy="32" r="4" fill="#F97316"/>
