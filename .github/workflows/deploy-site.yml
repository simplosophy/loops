name: Deploy docs site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/site/**'
      - 'docs/specs/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-site.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pin to Node 20 LTS. Node 22/24 ship npm 11, which intermittently
          # crashes 'npm ci' with "Exit handler never called!" on the hosted runners.
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve site URL and base path
        id: vars
        run: |
          # Convention: if docs/site/public/CNAME exists, the site is served from
          # a custom domain at the root, so base must be "/" and SITE_URL the domain.
          # Otherwise fall back to the github.io subpath (<owner>.github.io/<repo>/).
          if [ -f docs/site/public/CNAME ]; then
            domain=$(tr -d '[:space:]' < docs/site/public/CNAME)
            echo "base=/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${domain}" >> "$GITHUB_OUTPUT"
            echo "Deploying for custom domain: ${domain}"
          else
            echo "base=/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"
            echo "site_url=https://${{ github.repository_owner }}.github.io" >> "$GITHUB_OUTPUT"
            echo "Deploying for github.io subpath."
          fi

      - name: Build site
        env:
          BASE_PATH: ${{ steps.vars.outputs.base }}
          SITE_URL: ${{ steps.vars.outputs.site_url }}
        run: npm run build

      - name: Verify site
        env:
          BASE_PATH: ${{ steps.vars.outputs.base }}
          SITE_URL: ${{ steps.vars.outputs.site_url }}
        run: npm run verify:site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
